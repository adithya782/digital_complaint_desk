<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Complaint Details</title>
    <!-- <link rel="stylesheet" href="darkmode.css" /> -->
    <link rel="stylesheet" href="style.css" />

    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #f0f2f5;
        color: #333;
        padding: 20px;
        line-height: 1.6;
      }

      .card {
        background: #fff;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        margin-bottom: 20px;
        max-width: 600px;
        margin-left: auto;
        margin-right: auto;
      }

      h2,
      h3 {
        color: #1a1a1a;
        margin-top: 0;
      }

      .timeline-item {
        border-left: 3px solid #6d52ff;
        padding-left: 15px;
        margin-bottom: 20px;
        position: relative;
      }

      .timeline-item::before {
        content: "";
        position: absolute;
        left: -8px;
        top: 0;
        width: 12px;
        height: 12px;
        background: #6d52ff;
        border-radius: 50%;
      }

      textarea {
        width: 100%;
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
        box-sizing: border-box; /* Ensures padding doesn't break width */
        margin-bottom: 10px;
        font-family: inherit;
      }

      .btn-group {
        display: flex;
        gap: 10px;
      }

      button {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 8px;
        background: #6d52ff;
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: background 0.3s;
      }

      button:hover {
        background: #5841d9;
      }
      button.resolved {
        background: #28a745;
      }
      button.resolved:hover {
        background: #218838;
      }

      .back-btn {
        background: #6c757d;
        max-width: 600px;
        display: block;
        margin: 0 auto;
      }
    </style>
  </head>
  <body>
    <div class="card" id="complaintDetails"></div>
    <div class="card" id="timelineSection" style="margin-top: 20px">
      <h3>Complaint Timeline</h3>
      <ul id="timelineList"></ul>
    </div>

    <div class="card" id="actionSection" style="margin-top: 20px">
      <h3>Update Status</h3>
      <textarea
        id="actionDescription"
        placeholder="Enter inspection details or resolution notes..."
        style="width: 100%; height: 80px"
      ></textarea>
      <br />
      <button onclick="updateComplaint('In Progress', false)">
        Update Progress
      </button>
      <button
        onclick="updateComplaint('Resolved', true)"
        style="background: #28a745"
      >
        Mark Resolved
      </button>
    </div>

    <button onclick="history.back()">Back</button>

    <script src="complaint_details.js"></script>
    <!-- <script src="common-darkmode.js"></script> -->
    <script src="config.js"></script>
  </body>
</html>
