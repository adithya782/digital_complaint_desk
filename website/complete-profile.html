<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SafeCity - Complete Profile</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      /* --- THEME VARIABLES FROM HOME PAGE --- */
      :root {
        --primary: #6d52ff;
        --sos-red: #ff4f5e;
        --msg-green: #2ecc71;
        --blue-accent: #2d8cff;
        --bg-gradient: linear-gradient(
          -45deg,
          #0f172a,
          #2e1065,
          #4c1d95,
          #1e1b4b
        );
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      /* --- ANIMATED BACKGROUND FROM HOME PAGE --- */
      @keyframes gradientBG {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      body {
        background: var(--bg-gradient);
        background-size: 400% 400%;
        animation: gradientBG 15s ease infinite;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      /* --- EXACT GLASSMORPHISM CONTAINER --- */
      .container {
        width: 1100px;
        height: 750px;
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.05),
          rgba(255, 255, 255, 0.01)
        );
        backdrop-filter: blur(25px);
        -webkit-backdrop-filter: blur(25px);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 40px;
        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
        display: flex;
        overflow: hidden;
      }

      /* --- LEFT PANEL --- */
      .left-panel {
        width: 45%;
        background: rgba(15, 23, 42, 0.3);
        border-right: 1px solid rgba(255, 255, 255, 0.1);
        padding: 40px;
        color: #ffffff;
        display: flex;
        flex-direction: column;
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .logo-icon {
        background: var(--primary);
        width: 40px;
        height: 40px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-size: 18px;
      }

      .logo h2 {
        color: #fff;
        font-size: 22px;
        font-weight: 600;
      }

      .left-content {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
      }

      .left-content h1 {
        font-size: 38px;
        margin-bottom: 10px;
        color: #ffffff;
      }

      .left-content p {
        color: rgba(255, 255, 255, 0.6);
        margin-bottom: 40px;
        line-height: 1.5;
      }

      /* --- FLOATING VISUAL WRAPPER & ANIMATIONS --- */
      @keyframes float-animation {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-12px);
        }
      }

      .left-visual-wrapper {
        position: relative;
        width: 320px;
        margin: 0 auto;
      }

      .left-visual-wrapper img {
        width: 100%;
        display: block;
        position: relative;
        z-index: 1;
        border-radius: 25px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        filter: drop-shadow(0 15px 25px rgba(0, 0, 0, 0.3));
      }

      .float-badge {
        position: absolute;
        z-index: 2;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #fff;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(10px);
        font-weight: bold;
        animation: float-animation 4s ease-in-out infinite;
      }

      .sos {
        width: 55px;
        height: 55px;
        background: var(--sos-red);
        top: -20px;
        left: -20px;
        border-radius: 50%;
        font-size: 14px;
        animation-delay: 0s;
      }

      .shield {
        width: 65px;
        height: 65px;
        background: var(--primary);
        bottom: -20px;
        left: -30px;
        border-radius: 18px;
        font-size: 22px;
        animation-delay: 0.5s;
      }

      .message {
        width: 55px;
        height: 55px;
        background: var(--msg-green);
        top: 40px;
        right: -30px;
        border-radius: 18px;
        font-size: 18px;
        animation-delay: 1s;
      }

      /* --- RIGHT PANEL --- */
      .right-panel {
        width: 55%;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 40px;
        background: transparent;
      }

      .register-box {
        width: 100%;
        max-width: 440px;
      }

      .register-box h1 {
        text-align: center;
        font-size: 32px;
        margin-bottom: 5px;
        color: #ffffff;
      }

      .subtitle {
        text-align: center;
        color: rgba(255, 255, 255, 0.6);
        margin-bottom: 25px;
      }

      /* GLASS INPUT BOXES */
      .input-box {
        width: 100%;
        height: 50px;
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 14px;
        display: flex;
        align-items: center;
        padding: 0 15px;
        margin-bottom: 15px;
        background: rgba(255, 255, 255, 0.03);
        transition: all 0.3s ease;
      }

      .input-box:focus-within {
        border-color: var(--primary);
        background: rgba(255, 255, 255, 0.06);
        box-shadow: 0 0 15px rgba(109, 82, 255, 0.3);
      }

      .input-box i {
        color: rgba(255, 255, 255, 0.4);
        font-size: 16px;
        width: 20px;
        text-align: center;
      }

      .input-box input {
        width: 100%;
        border: none;
        outline: none;
        background: transparent;
        padding-left: 12px;
        font-size: 14px;
        color: #ffffff;
      }

      .input-box input::placeholder {
        color: rgba(255, 255, 255, 0.4);
      }

      /* REGISTER ACTION BUTTON */
      .register-btn {
        width: 100%;
        height: 50px;
        border: none;
        border-radius: 14px;
        background: var(--primary);
        color: #ffffff;
        font-size: 16px;
        font-weight: 500;
        cursor: pointer;
        margin-top: 20px;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }

      .register-btn:hover {
        background: #7e67ff;
        transform: translateY(-4px);
        box-shadow: 0 10px 20px rgba(109, 82, 255, 0.4);
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="left-panel">
        <div class="logo">
          <div class="logo-icon"><i class="fa-solid fa-shield-halved"></i></div>
          <h2>SafeCity</h2>
        </div>

        <div class="left-content">
          <h1>Almost Ready!</h1>
          <p>
            Just a few more details to help secure your profile context and make
            your city safer.
          </p>

          <div class="left-visual-wrapper">
            <div class="float-badge sos">SOS</div>
            <div class="float-badge shield">
              <i class="fa-solid fa-shield"></i>
            </div>
            <div class="float-badge message">
              <i class="fa-solid fa-message"></i>
            </div>
            <img
              src="https://img.officer.com/files/base/cygnus/ofcr/image/2022/05/16x9/raptorconnect.6283cc00d79b4.png?auto=format,compress&fit=fill&fill=blur&w=1200&h=630"
              alt="SafeCity Dashboard Core Image"
            />
          </div>
        </div>
      </div>

      <div class="right-panel">
        <div class="register-box">
          <h1>Complete Profile</h1>
          <p class="subtitle">Secure your account parameters</p>

          <div
            class="input-box"
            style="
              opacity: 0.5;
              background: rgba(255, 255, 255, 0.01);
              cursor: not-allowed;
            "
          >
            <i class="fa-regular fa-envelope"></i>
            <input
              type="email"
              id="profileEmail"
              placeholder="Google Email"
              readonly
              style="cursor: not-allowed"
            />
          </div>

          <div class="input-box">
            <i class="fa-solid fa-phone"></i>
            <input type="tel" id="profilePhone" placeholder="Phone Number" />
          </div>

          <div class="input-box">
            <i class="fa-solid fa-lock"></i>
            <input
              type="password"
              id="profilePassword"
              placeholder="Create Local Password"
            />
          </div>

          <div class="input-box">
            <i class="fa-solid fa-lock"></i>
            <input
              type="password"
              id="profileConfirmPassword"
              placeholder="Confirm Password"
            />
          </div>

          <button class="register-btn" id="saveProfileBtn">
            Finalize Setup
          </button>
        </div>
      </div>
    </div>

    <script src="config.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        // 1. Grab temporary user data saved during the Google OAuth redirect callback loop
        // (You can store the user's email temporarily in localStorage during the initial registration fetch)
        const userEmail = localStorage.getItem("temp_oauth_email") || "";
        if (userEmail) {
          document.getElementById("profileEmail").value = userEmail;
        }

        // 2. Click handler to process and submit profile data payload
        document
          .getElementById("saveProfileBtn")
          .addEventListener("click", function (e) {
            e.preventDefault();

            const phone = document.getElementById("profilePhone").value.trim();
            const password = document.getElementById("profilePassword").value;
            const confirmPassword = document.getElementById(
              "profileConfirmPassword",
            ).value;

            // Logical validation using double pipes ||
            if (!phone || !password || !confirmPassword) {
              alert("Please fill in all details to proceed.");
              return;
            }

            if (password !== confirmPassword) {
              alert("Passwords do not match!");
              return;
            }

            const extendedProfilePayload = {
              email: userEmail,
              phone_number: phone,
              password: password,
            };

            console.log(
              "Submitting final profile parameters straight to Flask server matrix...",
            );

            // 3. Fire payload at your backend update profile route
            fetch(`${window.API_BASE_URL}/api/auth/google/complete-profile`, {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                // Optional: If your backend requires authorization token headers
                Authorization: "Bearer " + localStorage.getItem("access_token"),
              },
              body: JSON.stringify(extendedProfilePayload),
            })
              .then((res) => {
                if (!res.ok) {
                  // Try to read it as text first so we can see the raw HTML error page
                  return res.text().then((text) => {
                    throw new Error(
                      `Server returned status ${res.status}: ${text}`,
                    );
                  });
                }
                return res.json();
              })

              .then((data) => {
                console.log("Server response:", data);
                if (data.success) {
                  alert("Profile setup fully completed successfully!");
                  // Wipe temporary records and navigate home
                  localStorage.removeItem("temp_oauth_email");
                  // window.location.href = "login.html";
                  window.location.replace("login.html");
                }
              })
              .catch((err) => {
                console.error("Networking communication failure:", err);
                alert(
                  "Could not establish connection link back to Flask server runtime.",
                );
              });
          });
      });
    </script>
  </body>
</html>
