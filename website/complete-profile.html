<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SafeCity - Complete Profile</title>

  <link rel="stylesheet" href="regd.css">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

  <div class="container">

    <div class="left-panel">
      <div class="logo">
        <i class="fa-solid fa-shield-halved"></i>
        <span>SafeCity</span>
      </div>

      <div class="left-content">
        <h1>Almost Ready!</h1>
        <p>
          Just a few more details to help secure your profile context and make your city safer.
        </p>

        <div class="floating-icons">
          <div class="sos">SOS</div>
          <div class="shield">
            <i class="fa-solid fa-shield"></i>
          </div>
          <div class="message">
            <i class="fa-solid fa-message"></i>
          </div>
        </div>

        <img src="https://img.officer.com/files/base/cygnus/ofcr/image/2022/05/16x9/raptorconnect.6283cc00d79b4.png?auto=format,compress&fit=fill&fill=blur&w=1200&h=630" alt="SafeCity Dashboard Core Image">
      </div>
    </div>

    <div class="right-panel">
      <div class="register-box">
        <h1>Complete Profile</h1>
        <p class="subtitle">Secure your account parameters</p>

        <div class="input-box" style="opacity: 0.7; background: #f5f5f5;">
          <i class="fa-regular fa-envelope"></i>
          <input type="email" id="profileEmail" placeholder="Google Email" readonly>
        </div>

        <div class="input-box">
          <i class="fa-solid fa-phone"></i>
          <input type="tel" id="profilePhone" placeholder="Phone Number">
        </div>

        <div class="input-box">
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="profilePassword" placeholder="Create Local Password">
        </div>

        <div class="input-box">
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="profileConfirmPassword" placeholder="Confirm Password">
        </div>

        <button class="register-btn" id="saveProfileBtn">
          Finalize Setup
        </button>

      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
        // 1. Grab temporary user data saved during the Google OAuth redirect callback loop
        // (You can store the user's email temporarily in localStorage during the initial registration fetch)
        const userEmail = localStorage.getItem('temp_oauth_email') || "";
        if (userEmail) {
            document.getElementById('profileEmail').value = userEmail;
        }

        // 2. Click handler to process and submit profile data payload
        document.getElementById('saveProfileBtn').addEventListener('click', function (e) {
            e.preventDefault();

            const phone = document.getElementById('profilePhone').value.trim();
            const password = document.getElementById('profilePassword').value;
            const confirmPassword = document.getElementById('profileConfirmPassword').value;

            // Logical validation using double pipes || 
            if (!phone || !password || !confirmPassword) {
                alert('Please fill in all details to proceed.');
                return;
            }

            if (password !== confirmPassword) {
                alert('Passwords do not match!');
                return;
            }

            const extendedProfilePayload = {
                email: userEmail,
                phone_number: phone,
                password: password
            };

            console.log("Submitting final profile parameters straight to Flask server matrix...");

            // 3. Fire payload at your backend update profile route
            fetch(`${window.API_BASE_URL}/api/auth/google/complete-profile`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    // Optional: If your backend requires authorization token headers
                    'Authorization': 'Bearer ' + localStorage.getItem('access_token')
                },
                body: JSON.stringify(extendedProfilePayload)
            })
            .then(res => {
                if (!res.ok) {
        // Try to read it as text first so we can see the raw HTML error page
                return res.text().then(text => { 
                    throw new Error(`Server returned status ${res.status}: ${text}`); 
                });
                } 
                    return res.json()})

            .then(data => {
                console.log("Server response:", data);
                if (data.success) {
                    alert('Profile setup fully completed successfully!');
                    // Wipe temporary records and navigate home
                    localStorage.removeItem('temp_oauth_email');
                    window.location.href = "dashboard.html";
                } else {
                    alert('Failed to complete profile configuration: ' + (data.error || 'Unknown network response context'));
                }
            })
            .catch(err => {
                console.error("Networking communication failure:", err);
                alert('Could not establish connection link back to Flask server runtime.');
            });
        });
    });
  </script>
</body>

</html>
