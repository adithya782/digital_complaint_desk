<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>File Complaint</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  
  <link rel="stylesheet" href="file_complaint.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
 <link rel="stylesheet" href="style.css">
 <link rel="stylesheet" href="darkmode.css">
</head>

<body>

<div class="container">

  <h1>
    <i class="fa-solid fa-file-circle-plus"></i>
    Register Complaint
  </h1>

  <form id="complaintForm">

    <div class="input-box">
      <label>Complaint Title</label>
      <input type="text" placeholder="Enter complaint title" id="title" required>
    </div>

    <div class="input-box">
      <label>Description</label>
      <textarea placeholder="Describe your issue" id="description" required></textarea>
    </div>

    <div class="input-box">
      <label>Where is the problem located?</label>
      <div style="display: flex; gap: 20px; margin: 10px 0;">
        <label style="font-weight: normal; cursor: pointer;">
          <input type="radio" name="locationMode" value="current" checked onclick="handleLocationModeChange()">
          At my current location right now
        </label>
        <label style="font-weight: normal; cursor: pointer;">
          <input type="radio" name="locationMode" value="map" onclick="handleLocationModeChange()">
          Witnessed somewhere else (Mark on Map)
        </label>
      </div>
    </div>

    <div class="input-box">
      <label>Selected Coordinates</label>
      <div class="location-box" style="display: flex; gap: 10px;">
        <input type="text" id="latitude" placeholder="Latitude" readonly required>
        <input type="text" id="longitude" placeholder="Longitude" readonly required>
        
        <button type="button" id="gpsBtn" class="location-btn" onclick="getAutomaticLocation()">
          <i class="fa-solid fa-location-dot"></i>
        </button>
      </div>
      <small id="locationStatus" style="color: #666; display: block; margin-top: 5px;"></small>
    </div>

    <div id="mapContainer" style="display: none; margin-bottom: 20px;">
      <label style="display: block; margin-bottom: 8px; font-weight: bold; color: #6c63ff;">
        Click/Tap on the map to pin the exact problem location:
      </label>
      <div id="map" style="width: 100%; height: 320px; border-radius: 12px; border: 1px solid #ddd; box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);"></div>
    </div>

    <div class="input-box">
      <label>Upload Evidence (image/file/... - optional)</label>
      <input type="file" id="evidence">
    </div>

    <div class="input-box">
      <label>Anonymous Complaint</label>
      <select id="isAnonymous">
        <option value="false">No</option>
        <option value="true">Yes</option>
      </select>
    </div>

    <button type="submit" class="submit-btn" onclick="fileComplaint(event)">
      Submit Complaint
    </button>

  </form>

  

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="config.js"></script>
<script src="file_complaint.js"></script>
<script src="common-darkmode.js"></script>



</body>
</html>
