<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>File Complaint</title>

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="file_complaint.css" />
    <link rel="stylesheet" href="style.css" />

    <style>
      /* --- THEME ROOT CONFIGURATION: OCEANIC TEAL --- */
      :root {
        --primary: #00d2ff; /* Aurora Teal */
        --blue-accent: #0084ff;
        --bg-gradient: linear-gradient(
          -45deg,
          #060b14,
          #0a1c2a,
          #0f3142,
          #081622
        );
        --glass-bg: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.04),
          rgba(255, 255, 255, 0.01)
        );
        --glass-border: 1px solid rgba(255, 255, 255, 0.12);
        --input-bg: rgba(255, 255, 255, 0.03);
        --input-border: 1px solid rgba(255, 255, 255, 0.08);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      @keyframes gradientBG {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      body {
        background: var(--bg-gradient);
        background-size: 400% 400%;
        animation: gradientBG 15s ease infinite;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        color: #ffffff;
        padding: 40px 20px;
      }

      /* --- MASTER GLASSMORPHIC CONTAINER --- */
      .container {
        width: 100%;
        max-width: 550px;
        background: var(--glass-bg);
        backdrop-filter: blur(25px);
        -webkit-backdrop-filter: blur(25px);
        padding: 40px 35px;
        border-radius: 30px;
        border: var(--glass-border);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
      }

      .container h1 {
        text-align: center;
        margin-bottom: 30px;
        color: #ffffff;
        font-size: 24px;
        font-weight: 600;
        letter-spacing: 0.5px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
      }

      .container h1 i {
        color: var(--primary);
      }

      /* --- DATA ENTRY FIELDS CSS --- */
      .input-box {
        margin-bottom: 22px;
      }

      .input-box label {
        display: block;
        margin-bottom: 10px;
        font-weight: 500;
        font-size: 14px;
        color: rgba(255, 255, 255, 0.85);
      }

      .input-box input[type="text"],
      .input-box textarea,
      .input-box select {
        width: 100%;
        padding: 14px 16px;
        background: var(--input-bg);
        border: var(--input-border);
        border-radius: 12px;
        outline: none;
        color: #ffffff;
        font-size: 14px;
        transition: all 0.3s ease;
      }

      .input-box input::placeholder,
      .input-box textarea::placeholder {
        color: rgba(255, 255, 255, 0.3);
      }

      .input-box input[type="text"]:focus,
      .input-box textarea:focus,
      .input-box select:focus {
        border-color: var(--primary);
        background: rgba(255, 255, 255, 0.06);
        box-shadow: 0 0 15px rgba(0, 210, 255, 0.2);
      }

      /* Dropdown structural support for dark background layers */
      .input-box select option {
        background: #0a1c2a;
        color: #ffffff;
      }

      textarea {
        resize: none;
        height: 120px;
      }

      /* Native Custom File Input Adaptation */
      .input-box input[type="file"] {
        width: 100%;
        padding: 10px;
        background: rgba(255, 255, 255, 0.02);
        border: 1px dashed rgba(255, 255, 255, 0.15);
        border-radius: 12px;
        color: rgba(255, 255, 255, 0.6);
        cursor: pointer;
      }

      .input-box input[type="file"]::file-selector-button {
        background: rgba(0, 210, 255, 0.12);
        border: 1px solid rgba(0, 210, 255, 0.2);
        color: var(--primary);
        padding: 6px 14px;
        border-radius: 8px;
        cursor: pointer;
        margin-right: 10px;
        font-size: 12px;
        font-weight: 500;
        transition: 0.2s;
      }

      .input-box input[type="file"]::file-selector-button:hover {
        background: var(--primary);
        color: #060b14;
      }

      /* --- SELECTION UTILITY PILLS --- */
      input[type="radio"] {
        margin-right: 8px;
        accent-color: var(--primary);
        transform: scale(1.15);
        vertical-align: middle;
      }

      /* --- GEOLOCATION INTERFACE ALIGNMENT --- */
      .location-box {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: nowrap;
      }

      #latitude,
      #longitude {
        flex: 1;
        background: rgba(255, 255, 255, 0.02) !important;
        border: 1px solid rgba(255, 255, 255, 0.06) !important;
        color: rgba(255, 255, 255, 0.5) !important;
        cursor: not-allowed;
      }

      .location-btn {
        width: 50px;
        height: 50px;
        border: 1px solid rgba(0, 210, 255, 0.25);
        border-radius: 12px;
        background: rgba(0, 210, 255, 0.12);
        color: #ffffff;
        cursor: pointer;
        font-size: 18px;
        transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        flex-shrink: 0;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .location-btn:hover {
        background: var(--primary);
        color: #060b14;
        box-shadow: 0 0 20px rgba(0, 210, 255, 0.3);
        transform: translateY(-2px);
      }

      #locationStatus {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.4) !important;
      }

      /* --- LEAFLET MAP ELEMENT WRAPPERS --- */
      #mapContainer label {
        color: var(--primary) !important;
        font-size: 13px;
        font-weight: 500 !important;
      }

      #map {
        width: 100%;
        height: 280px !important;
        border-radius: 16px !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2) !important;
        z-index: 1;
      }

      /* Adjust Leaflet internal attribution layers to seamlessly adapt visually */
      .leaflet-container {
        background: #0f3142 !important;
      }

      /* --- DISPATCH EXECUTION ENGINE --- */
      .submit-btn {
        width: 100%;
        padding: 16px;
        border: none;
        border-radius: 14px;
        background: var(--primary);
        color: #060b14;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        margin-top: 10px;
        box-shadow: 0 4px 15px rgba(0, 210, 255, 0.2);
      }

      .submit-btn:hover {
        background: #ffffff;
        color: #060b14;
        box-shadow: 0 0 25px rgba(255, 255, 255, 0.4);
        transform: translateY(-2px);
      }
      .back-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: rgba(255, 255, 255, 0.6);
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
        padding: 8px 16px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 10px;
        margin-bottom: 20px;
        transition: all 0.3s ease;
      }

      .back-btn:hover {
        color: #ffffff;
        background: rgba(255, 255, 255, 0.08);
        border-color: var(--primary);
        box-shadow: 0 0 15px rgba(0, 210, 255, 0.2);
        transform: translateX(-3px);
      }
    </style>
  </head>

  <body>
    <div class="container">
      <a href="user_dashboard.html" class="back-btn">
        <i class="fa-solid fa-arrow-left"></i> Back to Dashboard
      </a>
      <h1>
        <i class="fa-solid fa-file-circle-plus"></i>
        Register Complaint
      </h1>

      <form id="complaintForm">
        <div class="input-box">
          <label>Complaint Title</label>
          <input
            type="text"
            placeholder="Enter complaint title"
            id="title"
            required
          />
        </div>

        <div class="input-box">
          <label>Description</label>
          <textarea
            placeholder="Describe your issue"
            id="description"
            required
          ></textarea>
        </div>

        <div class="input-box">
          <label>Where is the problem located?</label>
          <div style="display: flex; gap: 20px; margin: 10px 0">
            <label
              style="
                font-weight: normal;
                cursor: pointer;
                display: flex;
                align-items: center;
                font-size: 14px;
              "
            >
              <input
                type="radio"
                name="locationMode"
                value="current"
                checked
                onclick="handleLocationModeChange()"
              />
              At my current location right now
            </label>
            <label
              style="
                font-weight: normal;
                cursor: pointer;
                display: flex;
                align-items: center;
                font-size: 14px;
              "
            >
              <input
                type="radio"
                name="locationMode"
                value="map"
                onclick="handleLocationModeChange()"
              />
              Witnessed somewhere else (Mark on Map)
            </label>
          </div>
        </div>

        <div class="input-box">
          <label>Selected Coordinates</label>
          <div class="location-box">
            <input
              type="text"
              id="latitude"
              placeholder="Latitude"
              readonly
              required
            />
            <input
              type="text"
              id="longitude"
              placeholder="Longitude"
              readonly
              required
            />

            <button
              type="button"
              id="gpsBtn"
              class="location-btn"
              onclick="getAutomaticLocation()"
            >
              <i class="fa-solid fa-location-dot"></i>
            </button>
          </div>
          <small id="locationStatus"></small>
        </div>

        <div id="mapContainer" style="display: none; margin-bottom: 20px">
          <label>
            Click/Tap on the map to pin the exact problem location:
          </label>
          <div id="map"></div>
        </div>

        <div class="input-box">
          <label>Upload Evidence (image/file/... - optional)</label>
          <input type="file" id="evidence" />
        </div>

        <div class="input-box">
          <label>Anonymous Complaint</label>
          <select id="isAnonymous">
            <option value="false">No</option>
            <option value="true">Yes</option>
          </select>
        </div>

        <button type="submit" class="submit-btn" onclick="fileComplaint(event)">
          Submit Complaint
        </button>
      </form>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="config.js"></script>
    <script src="file_complaint.js"></script>
  </body>
</html>
