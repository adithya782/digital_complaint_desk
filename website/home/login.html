<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>SafeCity Login</title>

  <link rel="stylesheet" href="auth.css">

  <!-- FONT AWESOME -->
  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

  <div class="container">

    <!-- LEFT SIDE -->

    <div class="left-panel">

      <div class="logo">

        <i class="fa-solid fa-shield-halved"></i>

        <span>SafeCity</span>

      </div>

      <div class="left-content">

        <h1>Welcome Back!</h1>

        <p>
          Login to continue and make
          your community safer.
        </p>

        <!-- FLOATING ICONS -->

        <div class="floating-icons">

          <div class="sos">
            SOS
          </div>

          <div class="shield">
            <i class="fa-solid fa-shield"></i>
          </div>

          <div class="message">
            <i class="fa-solid fa-message"></i>
          </div>

        </div>

        <!-- IMAGE -->

        <img src="https://img.officer.com/files/base/cygnus/ofcr/image/2022/05/16x9/raptorconnect.6283cc00d79b4.png?auto=format,compress&fit=fill&fill=blur&w=1200&h=630">

      </div>

    </div>

    <!-- RIGHT SIDE -->

    <div class="right-panel">

      <div class="login-box">

        <h1>Login</h1>

        <p class="subtitle">
          Enter your details to login
        </p>

        <!-- EMAIL -->

        <div class="input-box">

          <i class="fa-regular fa-envelope"></i>

          <input
          type="email"
          id="email"
          placeholder="Enter Email">

        </div>

        <!-- PASSWORD -->

        <div class="input-box">

          <i class="fa-solid fa-lock"></i>

          <input
          type="password"
          id="password"
          placeholder="Enter Password">
        </div>

        <!-- OPTIONS -->

        <div class="options">

          <div class="remember">

            <input type="checkbox">

            <span>Remember me</span>

          </div>

          <a href="#">
            Forgot Password?
          </a>

        </div>
        <!-- LOGIN BUTTON -->

        <button class="login-btn" id="loginBtn">
          Login
        </button>

        <!-- SOCIAL LOGIN -->

        <div class="divider">

          <span>Or login with</span>

        </div>

        <div class="social-login">

          <button>
            <i class="fa-brands fa-google"></i>
          </button>
        </div>

        <!-- REGISTER -->

         <p class="login-text">

          Don't have account?

          <a href="regd.html">
            Register
          </a>

        </p>

      </div>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
