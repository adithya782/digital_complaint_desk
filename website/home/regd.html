<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>SafeCity Register</title>

  <link rel="stylesheet" href="regd.css">

  <!-- FONT AWESOME -->

  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

  <div class="container">

    <!-- LEFT PANEL -->

    <div class="left-panel">

      <div class="logo">

        <i class="fa-solid fa-shield-halved"></i>

        <span>SafeCity</span>

      </div>

      <div class="left-content">

        <h1>Create Account</h1>

        <p>
          Register your account and
          make your community safer.
        </p>

        <!-- FLOAT ICONS -->

        <div class="floating-icons">

          <div class="sos">
            SOS
          </div>

          <div class="shield">
            <i class="fa-solid fa-shield"></i>
          </div>

          <div class="message">
            <i class="fa-solid fa-message"></i>
          </div>

        </div>

        <!-- IMAGE -->

        <img src="https://img.officer.com/files/base/cygnus/ofcr/image/2022/05/16x9/raptorconnect.6283cc00d79b4.png?auto=format,compress&fit=fill&fill=blur&w=1200&h=630">

      </div>

    </div>

    <!-- RIGHT PANEL -->

    <div class="right-panel">

      <div class="register-box">

        <h1>Register</h1>

        <p class="subtitle">
          Fill your details
        </p>

        <!-- NAME -->

        <div class="row">

          <div class="input-box">

            <i class="fa-solid fa-user"></i>

            <input
            type="text"
            id="firstName"
            placeholder="First Name">

          </div>

          <div class="input-box">

            <i class="fa-solid fa-user"></i>

            <input
            type="text"
            id="lastName"
            placeholder="Last Name">

          </div>

        </div>

        <!-- EMAIL -->

        <div class="input-box">

          <i class="fa-regular fa-envelope"></i>

          <input
          type="email"
          id="email"
          placeholder="Email Address">

        </div>

        <!-- PHONE -->

        <div class="input-box">

          <i class="fa-solid fa-phone"></i>

          <input
          type="tel"
          id="phone"
          placeholder="Phone Number">

        </div>

        <!-- GENDER -->

        <div class="gender-box">

          <label>
            <input type="radio"
            name="gender">

            Male
          </label>

          <label>
            <input type="radio"
            name="gender">

            Female
          </label>

          <label>
            <input type="radio"
            name="gender">

            Other
          </label>

        </div>

        <!-- PASSWORD -->

        <div class="input-box">

          <i class="fa-solid fa-lock"></i>

          <input
          type="password"
          id="password"
          placeholder="Create Password">

          <i class="fa-regular fa-eye eye"
          id="togglePassword"></i>

        </div>

        <!-- CONFIRM PASSWORD -->

        <div class="input-box">

          <i class="fa-solid fa-lock"></i>

          <input
          type="password"
          id="confirmPassword"
          placeholder="Confirm Password">

          <i class="fa-regular fa-eye eye"
          id="toggleConfirmPassword"></i>

        </div>

        <!-- REGISTER BUTTON -->

        <button
        type="button"
        class="register-btn"
        id="registerBtn">

          Register

        </button>

        <!-- LOGIN -->

        <p class="login-text">

          Already have an account?

          <a href="index.html">
            Login
          </a>

        </p>

      </div>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
