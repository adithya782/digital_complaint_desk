<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>SafeCity Register</title>

  <link rel="stylesheet" href="register.css">

  <!-- FONT AWESOME -->
  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

  <!-- GOOGLE FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

  <div class="container">

    <!-- LEFT PANEL -->
    <div class="left-panel">

      <!-- LOGO -->
      <div class="logo">
        <i class="fa-solid fa-shield-halved"></i>
        <span>SafeCity</span>
      </div>

      <!-- CONTENT -->
      <div class="left-content">

        <h1>Create Account</h1>

        <p>
          Join SafeCity and help create
          <br>
          a safer community together.
        </p>

        <img src="https://cdn-icons-png.flaticon.com/512/4230/4230550.png">

      </div>

    </div>

    <!-- RIGHT PANEL -->
    <div class="right-panel">

      <div class="register-box">

        <h1>Register</h1>

        <p class="subtitle">
          Create your new account
        </p>

        <!-- USER / STAFF -->
        <div class="role-buttons">

          <button class="role active" id="userBtn">
            <i class="fa-solid fa-user"></i>
            User
          </button>

          <button class="role" id="staffBtn">
            <i class="fa-solid fa-user-shield"></i>
            Staff
          </button>

        </div>

        <!-- FULL NAME -->
        <div class="input-box">
          <i class="fa-solid fa-user"></i>

          <input type="text"
          placeholder="Enter Full Name">
        </div>

        <!-- EMAIL -->
        <div class="input-box">
          <i class="fa-regular fa-envelope"></i>

          <input type="email"
          placeholder="Enter Email">
        </div>

        <!-- PHONE -->
        <div class="input-box">
          <i class="fa-solid fa-phone"></i>

          <input type="text"
          placeholder="Enter Phone Number">
        </div>

        <!-- PASSWORD -->
        <div class="input-box">
          <i class="fa-solid fa-lock"></i>

          <input type="password"
          placeholder="Create Password">
        </div>

        <!-- REGISTER BUTTON -->
        <button class="register-btn">
          Create Account
        </button>

        <!-- LOGIN LINK -->
        <p class="login-link">
          Already have an account?
          <a href="login.html">Login</a>
        </p>

      </div>

    </div>

  </div>

  <script src="register.js"></script>

</body>
</html>
