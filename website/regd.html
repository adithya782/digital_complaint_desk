<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
  content="width=device-width, initial-scale=1.0">

  <title>SafeCity Register</title>

  <!-- CSS -->

  <link rel="stylesheet" href="regd.css">

  <!-- FONT AWESOME -->

  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <!-- Google OAuth-->
  <script src="https://accounts.google.com/gsi/client" async defer></script> 

</head>

<body>

  <!-- MAIN CONTAINER -->

  <div class="container">

    <!-- LEFT PANEL -->

    <div class="left-panel">

      <!-- LOGO -->

      <div class="logo">

        <i class="fa-solid fa-shield-halved"></i>

        <span>SafeCity</span>

      </div>

      <!-- LEFT CONTENT -->

      <div class="left-content">

        <h1>Create Account</h1>

        <p>
          Register your account and
          make your city safer.
        </p>

        <!-- FLOAT ICONS -->

        <div class="floating-icons">

          <div class="sos">
            SOS
          </div>

          <div class="shield">

            <i class="fa-solid fa-shield"></i>

          </div>

          <div class="message">

            <i class="fa-solid fa-message"></i>

          </div>

        </div>

        <!-- IMAGE -->

        <img src="https://img.officer.com/files/base/cygnus/ofcr/image/2022/05/16x9/raptorconnect.6283cc00d79b4.png?auto=format,compress&fit=fill&fill=blur&w=1200&h=630">

      </div>

    </div>

    <!-- RIGHT PANEL -->

    <div class="right-panel">

      <!-- REGISTER BOX -->

      <div class="register-box">

        <h1>Register</h1>

        <p class="subtitle">
          Fill your details
        </p>

        <!-- FULL NAME -->

        <div class="input-box">

          <i class="fa-solid fa-user"></i>

          <input
          type="text"
          placeholder="Full Name"
          id="fullname">

        </div>

        <!-- PHONE -->

        <div class="input-box">

          <i class="fa-solid fa-phone"></i>

          <input
          type="tel"
          placeholder="Phone Number"
          id="phone">

        </div>

        <!-- EMAIL -->

        <div class="input-box">

          <i class="fa-regular fa-envelope"></i>

          <input
          type="email"
          placeholder="Email Address"
          id="email">

        </div>

        <!-- PASSWORD -->

        <div class="input-box">

          <i class="fa-solid fa-lock"></i>

          <input
          type="password"
          id="password"
          placeholder="Create Password">
        </div>
        <!-- CONFIRM PASSWORD -->

        <div class="input-box">

          <i class="fa-solid fa-lock"></i>

          <input
          type="password"
          id="confirmPassword"
          placeholder="Confirm Password">

        </div>

        <!-- REGISTER BUTTON -->

        <button class="register-btn">
          Register
        </button>
        <div style="text-align: center; margin: 16px 0; color: #888; font-size: 14px; font-weight: 500;">or</div>

        <div id="googleButtonDiv" style="display: flex; justify-content: center; width: 100%; min-height: 40px;"></div>

        <!-- LOGIN -->

        <p class="login-text">

          Already have an account?

          <a href="login.html">
            Login
          </a>
          

        </p>

      </div>

    </div>

  </div>

  <!-- JS -->
  <script src="config.js"></script>
  <script src="register.js"></script>

</body>
</html>
