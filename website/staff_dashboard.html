<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Officer Command Dashboard</title>

    <link rel="stylesheet" href="staff_dashboard.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <button class="menu-btn" id="menuBtn">
      <i class="fa-solid fa-bars"></i>
    </button>

    <div class="sidebar" id="sidebar">
      <div class="logo">
        <i class="fa-solid fa-shield-halved"></i>
        <span class="text">STAFF DASHBOARD</span>
      </div>
      <ul>
        <li>
          <button class="side-btn active">
            <i class="fa-solid fa-chart-pie"></i>
            <span class="text">Overview</span>
          </button>
        </li>
        <li>
          <button class="side-btn">
            <i class="fa-solid fa-clock-rotate-left"></i>
            <span class="text">Issue History</span>
          </button>
        </li>
        <li>
          <button class="side-btn">
            <i class="fa-solid fa-layer-group"></i>
            <span class="text">Departments</span>
          </button>
        </li>
        <li>
          <button class="side-btn">
            <i class="fa-solid fa-user-gear"></i>
            <span class="text">Profile Settings</span>
          </button>
        </li>
        <li>
          <button class="side-btn logout-item" onclick="logout()">
            <i class="fa-solid fa-right-from-bracket"></i>
            <span class="text">Secure Logout</span>
          </button>
        </li>
      </ul>
    </div>

    <div class="main-content">
      <div class="topbar">
        <div>
          <h2>
            Welcome Back, Officer <span id="dashboardUsername">x</span> 👋
          </h2>
          <p class="subtitle">System Operational Center Dashboard</p>
        </div>
      </div>

      <div class="stats">
        <button class="stat-card blue">
          <div class="card-data">
            <h4>Incoming</h4>
            <h2 id="incoming_count">0</h2>
          </div>
          <i class="fa-solid fa-folder-plus"></i>
        </button>

        <button class="stat-card orange">
          <div class="card-data">
            <h4>Pending Complaints</h4>
            <h2 id="pending_count">0</h2>
          </div>
          <i class="fa-solid fa-spinner fa-spin-hover"></i>
        </button>

        <button class="stat-card green">
          <div class="card-data">
            <h4>Resolved Complaints</h4>
            <h2 id="resolved_count">0</h2>
          </div>
          <i class="fa-solid fa-check-double"></i>
        </button>

        <button class="stat-card slate">
          <div class="card-data">
            <h4>Total Complaints</h4>
            <h2 id="total_count">0</h2>
          </div>
          <i class="fa-solid fa-database"></i>
        </button>
      </div>

      <div class="content-grid">
        <div class="issues-box">
          <div class="box-header">
            <h3>
              <i class="fa-solid fa-list-check"></i> Action Item Priority Queue
            </h3>
          </div>
          <ul id="TodayIssues"></ul>
          <div id="complaintDetails" class="hidden"></div>
        </div>

        <div class="profile-box" id="profileBox">
          <div class="avatar-wrapper">
            <img
              src="https://tse2.mm.bing.net/th/id/OIP.Vh2OQraISqT4SE80nDJ1aQHaGj?cb=thfvnextfalcon&rs=1&pid=ImgDetMain&o=7&rm=3"
              alt="Officer Profile Record"
            />
            <span class="badge-online"></span>
          </div>
          <h3>Officer Credentials</h3>
          <div class="profile-details">
            <p><b>Registry ID:</b> <span id="staff_id">4730</span></p>
            <p>
              <b>Unit Assignment:</b>
              <span id="department">CIC Operations</span>
            </p>
            <p>
              <b>Clearance Tier:</b>
              <span class="clearance-badge">Active Duty</span>
            </p>
          </div>
        </div>
      </div>

      <div class="quick-actions">
        <button class="action-btn msg-btn" onclick="sendMessage()">
          <i class="fa-solid fa-paper-plane"></i> Dispatch Secure Broadcast
        </button>
        <button class="action-btn report-btn" onclick="generateReport()">
          <i class="fa-solid fa-file-shield"></i> Compile Audit Statement
        </button>
      </div>
    </div>

    <script src="config.js"></script>
    <script src="staff_dashboard.js"></script>
  </body>
</html>
