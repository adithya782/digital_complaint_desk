<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Complaint Timeline</title>
    <style>
      .card {
        max-width: 600px;
        margin: 30px auto;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        background: white;
      }
      .timeline {
        border-left: 2px solid #6d52ff;
        padding-left: 20px;
        margin-top: 20px;
      }
      .item {
        margin-bottom: 20px;
      }
      .error {
        color: red;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2 id="complaintTitle">Loading...</h2>
      <p>Status: <b id="statusBadge">Loading...</b></p>
      <div class="timeline" id="timelineList"></div>
      <button onclick="history.back()">Back</button>
    </div>

    <script src="config.js"></script>
    <script>
      const id = new URLSearchParams(window.location.search).get("id");

      if (!id) {
        document.body.innerHTML =
          "<div class='card'><h2>Error</h2><p>No Complaint ID found.</p></div>";
      } else {
        // 1. Fetch Details (Match this to your Specific_Complaints resource)
        fetch(`${window.API_BASE_URL}/api/complaints/${id}`, {
          headers: {
            Authorization: "Bearer " + localStorage.getItem("access_token"),
          },
        })
          .then((res) => res.json())
          .then((data) => {
            // Note: If your API returns an object directly, remove the [0]
            const c = Array.isArray(data) ? data[0] : data;
            document.getElementById("complaintTitle").innerText = c.title;
            document.getElementById("statusBadge").innerText = c.status;
          })
          .catch((err) => console.error("Details error:", err));

        // 2. Fetch Timeline (Matching your route: /api/complaint/timeline/<int:complaint_id>)
        fetch(`${window.API_BASE_URL}/api/complaint/timeline/${id}`, {
          headers: {
            Authorization: "Bearer " + localStorage.getItem("access_token"),
          },
        })
          .then((res) => res.json())
          .then((data) => {
            // data now contains {title, status, timeline}
            document.getElementById("complaintTitle").innerText = data.title;
            document.getElementById("statusBadge").innerText = data.status;

            const list = document.getElementById("timelineList");
            list.innerHTML = data.timeline
              .map(
                (e) => `
        <div class="item">
            <small>${e.date}</small> <p><b>${e.step}:</b> ${e.note}</p>
        </div>
    `,
              )
              .join("");
          })
          .catch((err) => console.error("Error:", err));
      }
    </script>
  </body>
</html>
