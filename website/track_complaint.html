<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Complaint Timeline</title>
    <style>
      .card {
        max-width: 600px;
        margin: 30px auto;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        background: white;
      }
      .timeline {
        border-left: 2px solid #6d52ff;
        padding-left: 20px;
        margin-top: 20px;
      }
      .item {
        margin-bottom: 20px;
      }
      .error {
        color: red;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2 id="complaintTitle">Loading...</h2>
      <p>Status: <b id="statusBadge">Loading...</b></p>

      <div id="keyEntrySection" style="display: none; margin: 20px 0">
        <p>This complaint requires a tracking key:</p>
        <input
          type="text"
          id="manualKeyInput"
          placeholder="Enter Tracking Key"
        />
        <button onclick="fetchWithKey()">Submit Key</button>
      </div>

      <div class="timeline" id="timelineList"></div>
      <button onclick="history.back()">Back</button>
    </div>

    <script src="config.js"></script>
    <script src="track_complaint.js"></script>

    <script>
      // This is the only thing needed here now:
      document.addEventListener("DOMContentLoaded", () => {
        const id = new URLSearchParams(window.location.search).get("id");
        if (!id) {
          document.body.innerHTML =
            "<div class='card'><h2>Error</h2><p>No Complaint ID found.</p></div>";
        } else {
          // Start the flow
          fetchData(id, "");
        }
      });
    </script>
  </body>
</html>
