<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Complaint Timeline</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      /* --- THEME VARIABLES: DISTINCT CITIZEN OCEANIC TEAL PALETTE --- */
      :root {
        --primary: #00d2ff; /* Aurora Teal */
        --blue-accent: #0084ff;
        --bg-gradient: linear-gradient(
          -45deg,
          #060b14,
          #0a1c2a,
          #0f3142,
          #081622
        );
        --glass-bg: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.04),
          rgba(255, 255, 255, 0.01)
        );
        --glass-border: 1px solid rgba(255, 255, 255, 0.12);
        --input-bg: rgba(255, 255, 255, 0.03);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      /* --- ANIMATED BACKGROUND --- */
      @keyframes gradientBG {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      body {
        background: var(--bg-gradient);
        background-size: 400% 400%;
        animation: gradientBG 15s ease infinite;
        min-height: 100vh;
        color: #ffffff;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 40px 20px;
      }

      /* --- MASTER GLASSMORPHIC WRAPPER --- */
      .card {
        width: 100%;
        max-width: 600px;
        background: var(--glass-bg);
        backdrop-filter: blur(25px);
        -webkit-backdrop-filter: blur(25px);
        padding: 35px;
        border-radius: 26px;
        border: var(--glass-border);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
      }

      h2 {
        font-size: 22px;
        font-weight: 600;
        letter-spacing: 0.5px;
        color: #ffffff;
        margin-bottom: 8px;
      }

      .status-container {
        font-size: 14px;
        color: rgba(255, 255, 255, 0.6);
        margin-bottom: 25px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      #statusBadge {
        background: rgba(0, 210, 255, 0.12);
        color: var(--primary);
        padding: 4px 12px;
        border-radius: 20px;
        border: 1px solid rgba(0, 210, 255, 0.25);
        font-weight: 600;
        letter-spacing: 0.5px;
        text-transform: capitalize;
      }

      /* --- TRACKING KEY AUTHORIZATION AREA --- */
      #keyEntrySection {
        background: rgba(255, 79, 94, 0.05) !important;
        border: 1px dashed rgba(255, 79, 94, 0.3) !important;
        border-radius: 16px;
        padding: 20px !important;
        margin: 25px 0 !important;
      }

      #keyEntrySection p {
        font-size: 13px;
        color: rgba(255, 255, 255, 0.8);
        margin-bottom: 12px;
      }

      #manualKeyInput {
        width: 100%;
        padding: 12px 16px;
        background: rgba(0, 0, 0, 0.2);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        color: #ffffff;
        font-size: 14px;
        outline: none;
        transition: all 0.3s ease;
        margin-bottom: 12px;
      }

      #manualKeyInput:focus {
        border-color: var(--primary);
        box-shadow: 0 0 12px rgba(0, 210, 255, 0.2);
      }

      .key-submit-btn {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: var(--primary);
        color: #060b14;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .key-submit-btn:hover {
        background: #ffffff;
        box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
      }

      /* --- INTERACTIVE NEON TIMELINE ENGINE --- */
      .timeline {
        border-left: 2px dashed rgba(255, 255, 255, 0.15) !important;
        padding-left: 25px;
        margin: 30px 5px;
        position: relative;
      }

      /* Injected dynamic objects layout defaults */
      .timeline-item {
        position: relative;
        margin-bottom: 25px;
        color: rgba(255, 255, 255, 0.7);
        font-size: 14px;
        line-height: 1.6;
      }

      .timeline-item::before {
        content: "";
        position: absolute;
        left: -32px;
        top: 4px;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: var(--primary);
        box-shadow: 0 0 10px var(--primary);
        border: 2px solid #0a1c2a;
      }

      /* Secondary variant highlighting for historical item structures */
      .timeline-item:last-child {
        margin-bottom: 0;
      }

      /* --- GLOBAL NAVIGATION INTERFACE DISPATCH --- */
      .back-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.08);
        color: rgba(255, 255, 255, 0.7);
        padding: 10px 22px;
        border-radius: 12px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 500;
        transition: all 0.3s ease;
        margin-top: 10px;
      }

      .back-btn:hover {
        background: rgba(255, 255, 255, 0.08);
        color: #ffffff;
        border-color: var(--primary);
        box-shadow: 0 0 15px rgba(0, 210, 255, 0.2);
        transform: translateX(-2px);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2 id="complaintTitle">Loading...</h2>
      <div class="status-container">
        Status: <b id="statusBadge">Loading...</b>
      </div>

      <div id="keyEntrySection" style="display: none">
        <p>
          <i
            class="fa-solid fa-lock"
            style="color: #ff4f5e; margin-right: 6px"
          ></i>
          This complaint is private. Please enter the tracking key:
        </p>
        <input
          type="text"
          id="manualKeyInput"
          placeholder="Enter Tracking Key"
        />
        <button class="key-submit-btn" onclick="fetchWithKey()">
          Submit Key
        </button>
      </div>

      <div class="timeline" id="timelineList"></div>

      <button class="back-btn" onclick="history.back()">
        <i class="fa-solid fa-arrow-left"></i> Back
      </button>
    </div>

    <script src="config.js"></script>
    <script src="track_complaint.js"></script>
  </body>
</html>
