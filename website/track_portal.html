<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Track Complaint Portal</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <link rel="stylesheet" href="style.css" />
    <style>
      /* --- THEME VARIABLES: MATCHES CITIZEN OCEANIC TEAL PALETTE --- */
      :root {
        --primary: #00d2ff; /* Vibrant Cyan/Teal */
        --blue-accent: #0084ff;
        --bg-gradient: linear-gradient(
          -45deg,
          #060b14,
          #0a1c2a,
          #0f3142,
          #081622
        ); /* Deep Marine Steel */
        --glass-bg: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.04),
          rgba(255, 255, 255, 0.01)
        );
        --glass-border: 1px solid rgba(255, 255, 255, 0.12);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      /* --- ANIMATED BACKGROUND --- */
      @keyframes gradientBG {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      body {
        background: var(--bg-gradient);
        background-size: 400% 400%;
        animation: gradientBG 15s ease infinite;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #ffffff;
        padding: 20px;
        overflow-x: hidden;
      }

      /* --- CENTRAL PORTAL CONTAINER --- */
      .card {
        width: 100%;
        max-width: 550px;
        background: var(--glass-bg);
        backdrop-filter: blur(25px);
        -webkit-backdrop-filter: blur(25px);
        border: var(--glass-border);
        padding: 35px;
        border-radius: 30px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
        display: flex;
        flex-direction: column;
      }

      /* --- BACK BUTTON UTILITY --- */
      .back-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: rgba(255, 255, 255, 0.6);
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
        padding: 8px 16px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 10px;
        margin-bottom: 20px;
        transition: all 0.3s ease;
        width: fit-content;
      }

      .back-btn:hover {
        color: #ffffff;
        background: rgba(255, 255, 255, 0.08);
        border-color: var(--primary);
        box-shadow: 0 0 15px rgba(0, 210, 255, 0.2);
        transform: translateX(-3px);
      }

      h3 {
        font-size: 20px;
        font-weight: 600;
        margin-bottom: 20px;
        letter-spacing: 0.5px;
        color: #ffffff;
      }

      /* --- TRACKING UTILITIES LAYER --- */
      .input-group {
        display: flex;
        gap: 12px;
        margin-bottom: 25px;
      }

      input {
        flex-grow: 1;
        padding: 14px 20px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 14px;
        color: #ffffff;
        font-size: 14px;
        transition: all 0.3s ease;
      }

      input:focus {
        background: rgba(255, 255, 255, 0.06);
        border-color: var(--primary);
        box-shadow: 0 0 15px rgba(0, 210, 255, 0.2);
        outline: none;
      }

      input::placeholder {
        color: rgba(255, 255, 255, 0.35);
      }

      button {
        background: rgba(0, 210, 255, 0.12);
        border: 1px solid rgba(0, 210, 255, 0.25);
        color: #ffffff;
        padding: 14px 28px;
        border-radius: 14px;
        cursor: pointer;
        font-weight: 600;
        font-size: 15px;
        transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
      }

      button:hover {
        background: var(--primary);
        color: #060b14;
        box-shadow: 0 0 20px rgba(0, 210, 255, 0.4);
        transform: translateY(-2px);
      }

      hr {
        border: 0;
        height: 1px;
        background: linear-gradient(
          90deg,
          rgba(255, 255, 255, 0) 0%,
          rgba(255, 255, 255, 0.1) 50%,
          rgba(255, 255, 255, 0) 100%
        );
        margin: 30px 0;
      }

      /* --- COMPLAINT RENDERING NODES --- */
      #userComplaintsList {
        color: rgba(255, 255, 255, 0.5);
        font-size: 14px;
      }

      /* Targets dynamically rendered children injected by track_portal.js */
      .complaint-item {
        padding: 18px 20px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.01);
        border: 1px solid rgba(255, 255, 255, 0.03);
        margin-bottom: 12px;
        color: rgba(255, 255, 255, 0.85);
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .complaint-item:hover {
        background: rgba(255, 255, 255, 0.04);
        border-color: rgba(255, 255, 255, 0.1);
        transform: translateX(5px);
        color: #ffffff;
      }

      /* Compatibility fallback text when list empty/loading */
      #userComplaintsList:not(:has(.complaint-item)) {
        text-align: center;
        padding: 20px 0;
        color: rgba(255, 255, 255, 0.4);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <a href="user_dashboard.html" class="back-btn">
        <i class="fa-solid fa-arrow-left"></i> Back to Dashboard
      </a>

      <h3>Track Complaint</h3>
      <div class="input-group">
        <input
          type="text"
          id="complaintIdInput"
          placeholder="Enter Complaint ID"
        />
        <button onclick="trackById()">Track</button>
      </div>

      <hr />

      <h3>Your Recent Complaints</h3>
      <div id="userComplaintsList">Loading...</div>
    </div>

    <script src="config.js"></script>
    <script src="track_portal.js"></script>
  </body>
</html>
